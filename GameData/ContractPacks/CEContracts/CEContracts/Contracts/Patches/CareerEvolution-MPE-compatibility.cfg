//----------MPE compatibilty----------//

// The MPE patch is tested in an environment with stock + OPM + MPE (+ Kcalbeloh). 
// With other planet pack setups, YMMV. The patch hardcodes the names of the planets, so in a non-stock home system, this patch probably won't work.


//Fix for stock planet contracts with MPE installed
@CONTRACT_GROUP[CareerEvolution]:NEEDS[MPE]:AFTER[ContractPacks]
{
	@DATA:HAS[#title[Planets]]
	{
		@Mercury = Moho
		@Venus = Eve
		@Mars = Duna
		@Phobos = Duna.Children().First()
		@Jupiter = Jool
	}
}

//Fix for OPM contracts with MPE installed
@CONTRACT_TYPE[*Uranus*]:NEEDS[MPE,OPM]:AFTER[ContractPacks]
{
	@targetBody = Urlum
}
@CONTRACT_TYPE[*Neptune*]:NEEDS[MPE,OPM]:AFTER[ContractPacks]
{
	@targetBody = Neidon
}
@CONTRACT_TYPE[*Pluto*]:NEEDS[MPE,OPM]:AFTER[ContractPacks]
{
	@targetBody = Plock
}


