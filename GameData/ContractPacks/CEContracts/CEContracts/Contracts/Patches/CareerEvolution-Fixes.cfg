//----------General fixes----------//

// This patch fixes the following issues:
//  Error in description of MoonReturn contract
//  Numerical error in three-month station contract
//  "Uncrewed Orbits" contract group has wrong display name
//  Incorrect contract group for 4 "landing" contracts
//  Multiple Dres contracts causing issues
//  Contracts requiring you to land on a wormhole when Kcalbeloh is installed
//  Errors in space station resupply contracts


//Disable stock Exploration contracts
@CONTRACT_GROUP[CareerEvolution]:AFTER[ContractPacks]
{
	!disabledContractType,* = null
	disabledContractType = ExplorationContract
}
//Fix wording error in MoonReturn contract
@CONTRACT_TYPE[MoonReturn]:AFTER[ContractPacks]
{
	@PARAMETER[CollectScience]
	{
		@title ^= :from space around:while landed on:
	}
}

//Fix number error in 3-month station contract
@CONTRACT_TYPE[SSThreeMonths]:AFTER[ContractPacks]
{
	@completedMessage ^= :30:90:
	@PARAMETER[ThreeMonthsInSpace]
	{
		@title ^= :30:90:
	}
	@PARAMETER[Duration]
	{
		@duration = 90d
		@title ^= :30:90:
	}
}

//Fix display errors in contracts and groups
@CONTRACT_GROUP[CareerEvolution]:AFTER[ContractPacks]
{
	@CONTRACT_GROUP[UncrewedOrbits]
	{
		@displayName = Uncrewed Orbits
	}
}
@CONTRACT_TYPE[EveMoonsLanding,DunaMoonsLanding,MohoLanding,AsteroidLanding]:AFTER[ContractPacks]
{	
	@group = UncrewedLanding
}

//Fix for 2nd Dres contract issue
-CONTRACT_TYPE[FlybyCeres*,OrbitCeres,CeresLanding*,CeresRover*]:NEEDS[!RSS]:AFTER[ContractPacks] {}

//Fix errors in space station resupply contracts
@CONTRACT_TYPE[SSResupplyLS]:NEEDS[IFILifeSupport|Snacks|USILifeSupport]:AFTER[ContractPacks]
{
	@PARAMETER[ResupplyLS]
	{
		@PARAMETER[AllResources]
		{
			@title ^= :@\/suppliesSpace:@/supplies Space:
		}
	}
}
@CONTRACT_TYPE[SSResupplyLS]:NEEDS[TACLifeSupport|Kerbalism]:AFTER[ContractPacks]
{
	@PARAMETER[ResupplyLS]
	{
		@PARAMETER[AllResources]
		{
			@title ^= :@\/.+Space Oxygen:@/food Space Food, @/water Space Water, and @/oxygen Space Oxygen:
		}
	}
}


//----------Kcalbeloh compatibilty----------//
//Fix for wormhole landing contracts
@CONTRACT_TYPE[JoolMoonsLanding*]:NEEDS[KcalbelohSystem,!OPM]:AFTER[ContractPacks]
{
	@DATA:HAS[#title[Find?Moons]]
	{
		@Moons ^= :$:.Where(cb => cb.Name() != "WH3141A")
	}
}
//With OPM installed
@CONTRACT_TYPE[SarnusMoonsLanding*]:NEEDS[KcalbelohSystem,OPM]:AFTER[ContractPacks]
{
	@DATA:HAS[#title[Find?Moons]]
	{
		@Moons ^= :$:.Where(cb => cb.Name() != "WH3141A")
	}
}