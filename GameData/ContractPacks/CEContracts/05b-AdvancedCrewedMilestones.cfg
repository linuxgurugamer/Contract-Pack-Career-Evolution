// *************************** One Day Orbit

CONTRACT_TYPE
{
	name = OrbitOneDay
	group = CrewedMilestones
	
	title = Orbit for One Day
	agent = Experimental Engineering Group
	
	sortKey = 103.5
	
	notes = Launch a craft with at least one Kerbal and stay there for one day
	synopsis = Launch a craft with at least one Kerbal and stay there for one day
	
	description = Now that we have achieved the first major goal of our crewed space program, we need to ensure our life support systems can sustain a Kerbal for a full planetary rotation. Put a Kerbal in orbit for one day and bring them back safely.
	
	completedMessage = Congratulations! Our Kerbal survived a full day in space. This paves the way for much longer missions in the future.
	
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 1

	cancellable = true
	declinable = true
	
	targetBody = @CareerEvolution:Earth
    
	// REWARDS
	rewardScience = 3
	rewardReputation = 10
	rewardFunds = @CareerEvolution:Kerbucks4
	
	advanceFunds = @CareerEvolution:Kerbucks4
	
	prestige = Significant
	
	REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = Orbit-Crew
		title = Complete @contractType Contract
	}
	
	PARAMETER
	{
		name = OneDay
		type = VesselParameterGroup
		title = Orbit for One Day
		define = OneDay
	
		PARAMETER
		{
			name = NewVessel
			type = NewVessel
			title = Launch a New Vessel
			hideChildren = true
		}
		PARAMETER
		{
			name = OneCrew
			type = HasCrew
			minCrew = 1
			maxCrew = 99
			title = Have at least 1 crewmember on board
			hideChildren = true
		}
		PARAMETER
		{
			name = Orbit
			type = Orbit
			minPeA = @targetBody.AtmosphereAltitude()
			title = Orbit @targetBody
			disableOnStateChange = true
			hideChildren = true
		}
		PARAMETER
		{
			name = OneDayDuration
			type = Duration
			duration = 1d
			preWaitText = Waiting to reach orbit
			waitingText = Orbiting for @duration
			completionText = Orbits Complete! You may fire retros when ready
			disableOnStateChange = true
		}
		PARAMETER
		{
			name = ReturnHome
			type = ReturnHome
			targetBody = HomeWorld()
			title = Return Home Safely
			hideChildren = true
			completeInSequence = true
		}
	}
}

// *************************** Three Crew

