	synopsis = Launch a craft with at least two Kerbals and stay there for fourteen days
	
	description = The medical staff is losing their minds, but the math checks out: a lunar mission might take up to two weeks from launch to splashdown. We need you to stick two Kerbals in a tin can for 14 days to prove they can survive the duration of a maximum-length lunar round trip.
	
	completedMessage = Incredible! The crew is a bit cramped and definitely smells terrible, but they survived the 14-day endurance test. We are cleared for long-duration lunar flights.
	
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 1

	cancellable = true
	declinable = true
	
	targetBody = @CareerEvolution:Earth
    
	// REWARDS
