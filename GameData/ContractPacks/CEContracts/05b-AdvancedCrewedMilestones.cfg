	group = CrewedMilestones
	
	title = Put Three Kerbals in Orbit
	agent = Experimental Engineering Group
	
	sortKey = 104.5
	
	notes = Launch a craft with at least three Kerbals and achieve orbit
	synopsis = Launch a craft with at least three Kerbals, achieve orbit and return home
	
	description = Our ambitions are growing, and so are our spacecraft. To accomplish complex missions like landing on another body, we will need specialized crew members working together. Prove that we can safely launch, sustain, and recover a three-Kerbal crew.
	
	completedMessage = Mission Success! We now have the crew capacity required to operate complex multi-stage vehicles in space. 
	
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 1
	
	cancellable = true
	declinable = true
	
	targetBody = @CareerEvolution:Earth
    
	// REWARDS
	rewardScience = 3
	rewardReputation = 8
