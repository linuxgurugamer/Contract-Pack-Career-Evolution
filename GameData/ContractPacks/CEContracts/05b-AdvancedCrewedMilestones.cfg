// *************************** Docked Orbital Maneuvering

CONTRACT_TYPE
{
	name = DockedManeuver
	group = CrewedMilestones
	
	title = Docked Orbital Maneuvering
	agent = Experimental Engineering Group
	
	sortKey = 108.2
	
	notes = Dock two vessels in orbit, then use their combined propulsion to raise your Apoapsis
	synopsis = Dock two vessels in orbit, then use their combined propulsion to raise your Apoapsis
	
	description = It's one thing to dock two ships together; it's another to fly them as a single unit. We need you to dock a crewed vessel with a target vehicle in low orbit, and then use the target vehicle's engines to push the combined craft into a higher orbit. 
	
	completedMessage = Outstanding piloting! You have proven that we can assemble and pilot modular spacecraft in orbit, a strictly necessary skill for complex lunar architecture.
	
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 1
	
	cancellable = true
	declinable = true
	
	targetBody = @CareerEvolution:Earth
    
	// REWARDS
	rewardScience = 6
	rewardReputation = 20
	rewardFunds = @CareerEvolution:Kerbucks5
	
	advanceFunds = @CareerEvolution:Kerbucks5
	
	prestige = Exceptional
	
	REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = FirstDocking
		title = Complete @contractType Contract
	}
	
	PARAMETER
	{
		name = DockAndBurn
		type = VesselParameterGroup
		title = Dock and Maneuver
		
		PARAMETER
		{
			name = TwoCrew
			type = HasCrew
			minCrew = 2
			maxCrew = 99
			title = Have at least 2 crewmembers on board
			hideChildren = true
		}
		PARAMETER
		{
			name = Docking
			type = Docking
			title = Dock two spacecraft in orbit
			hideChildren = true
			disableOnStateChange = true
		}
		PARAMETER
		{
			name = OrbitShift
			type = Orbit
			minApA = 500000
			title = While docked, raise Apoapsis to at least 500 km
			disableOnStateChange = true
			completeInSequence = true
		}
	}
}

// *************************** High Orbit

CONTRACT_TYPE
{
	name = HighOrbit-Crew
	group = CrewedMilestones
	
	title = First Crewed High Orbit
	agent = Experimental Engineering Group
	
	sortKey = 108.5
	
	notes = Launch a craft with at least one Kerbal to a high elliptical orbit and return safely
	synopsis = Launch a craft with at least one Kerbal to a high elliptical orbit and return safely
	
	description = Before we can confidently send our crew to another planetary body, we must verify that our heat shields can handle higher reentry velocities and that our spacecraft can protect the crew from the intense radiation of high orbit. Send a crewed vessel to an altitude of at least 1,500 km and bring them home safely.
	
	completedMessage = Mission Success! The heat shields held up perfectly against the thermal stress of a high-velocity reentry, and the crew reported no ill effects from the radiation belts. We are ready to aim for the Moon!
	
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 1
	
	cancellable = true
	declinable = true
	
