// *************************** Scientific Satellite (Low Eccentricity)

// These contracts have been contributed by @echoLima

CONTRACT_TYPE
{
    name = ScientificSat
    group = Satellites
	
    title = Scientific Satellite (Low Eccentricity)
	agent = Experimental Engineering Group
	
	sortKey = 103
	
    notes = Launch a satellite into a near-circular orbit
    synopsis = Launch a satellite into a near-circular orbit
	
    description = Our scientists need a stable platform for long-term observation. Highly elliptical orbits vary too much in altitude for our instruments to calibrate correctly.
    completedMessage = Excellent! The data coming back is consistent and stable.
    
    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1
    maxSimultaneous = 1
	
    cancellable = true
    declinable = true
	
    targetBody = HomeWorld()
	
    // REWARDS
    rewardScience = 8
    rewardReputation = 15
    rewardFunds = @CareerEvolution:Kerbucks3
	
    advanceFunds = @CareerEvolution:Kerbucks2
	
	prestige = Significant

	REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = FirstSat
		title = Complete @contractType Contract
	}
	
	PARAMETER
	{
		name = ScientificSat
		type = VesselParameterGroup
		title = Scientific Satellite
		define = ScientificSat
		
		PARAMETER
		{
			name = NewVessel
			type = NewVessel
			title = Launch a New Vessel
			hideChildren = true
		}
		PARAMETER 
		{
			name = Crewmembers
			type = HasCrew
			minCrew = 0
			maxCrew = 0
			title = Uncrewed
			hideChildren = true
		}
		PARAMETER
		{
			name = Orbit
			type = Orbit
			// RP-1 Style: Force a circular orbit
            minAltitude = @targetBody.AtmosphereAltitude() * 1.5
            maxEccentricity = 0.04
			disableOnStateChange = true
			title = Achieve a Circular Orbit (Eccentricity < 0.04)
			hideChildren = true
		}
        PARAMETER
        {
            name = CollectScience
            type = CollectScience
            situation = InSpaceLow
            recoveryMethod = Transmit
            title = Transmit Science from Low Orbit
            hideChildren = true
        }
	}
}



// *************************** Sun-Synchronous Satellite (SSO)

CONTRACT_TYPE
{
    name = SunSyncSat
    group = Satellites
	
    title = Sun-Synchronous Orbit (SSO) Satellite
	agent = Experimental Engineering Group
	
	sortKey = 106
	
    notes = Launch a satellite into a Sun-Synchronous Orbit (Retrograde Near-Polar).
    synopsis = Launch a satellite into a Sun-Synchronous Orbit.
	
    description = We need a satellite that passes over the same spot on the ground at the same time every day for consistent lighting in our spy... err, "weather" photos. To do this, you must launch into a slightly retrograde polar orbit (between 96 and 102 degrees inclination).
    completedMessage = Perfect! The lighting conditions are consistent on every pass. We can see everything now.
    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1
    maxSimultaneous = 1
	
    cancellable = true
    declinable = true
	
    targetBody = HomeWorld()
	
    // REWARDS
    rewardScience = 8
    rewardReputation = 15
    rewardFunds = @CareerEvolution:Kerbucks3
	
    advanceFunds = @CareerEvolution:Kerbucks2
	
	prestige = Significant

	REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = PolarSat
		title = Complete @contractType Contract
	}
	
	PARAMETER
	{
		name = SSOSat
		type = VesselParameterGroup
		title = Sun-Synchronous Satellite
		define = SSOSat
		
		PARAMETER
		{
			name = NewVessel
			type = NewVessel
			title = Launch a New Vessel
			hideChildren = true
		}
		PARAMETER 
		{
			name = Crewmembers
			type = HasCrew
			minCrew = 0
			maxCrew = 0
			title = Uncrewed
			hideChildren = true
		}
		PARAMETER
		{
			name = Orbit
			type = Orbit
            
            // SSO Logic:
            // Altitude usually 600km - 800km
            minAltitude = 500000
            maxAltitude = 900000
            
            // Inclination: Slightly Retrograde Polar (96-102 degrees typically)
			minInclination = 96
			maxInclination = 102
            
            // Circular
            maxEccentricity = 0.05
            
			disableOnStateChange = true
			title = Achieve a Sun-Synchronous Orbit (Alt: 500-900km, Inc: 96-102 deg)
			hideChildren = true
		}
	}
}


// *************************** Molniya Satellite

CONTRACT_TYPE
{
    name = MolniyaSat
    group = Satellites
    
    title = Molniya Communications Satellite
    agent = Experimental Engineering Group
    
    sortKey = 104
    
    notes = Launch a satellite into a Molniya orbit (High Eccentricity, 63.4 degrees inclination)
    synopsis = Launch a satellite into a Molniya orbit
    
    description = Polar orbits are great, but satellites pass over the poles too quickly. A "Molniya" orbit uses a specific inclination (63.4 degrees) to cancel out orbital drift, and a high eccentricity to "hang" over the northern hemisphere for hours at a time.\n\n<b><color=white>Dynamic Target Altitudes:</color></b> Aim for an approximate Apoapsis of <b>@/targetApKM km</b> and a Periapsis of <b>@/targetPeKM km</b>.\n\n<b><color=white>Historical Information:</color></b> The Molniya orbit was perfected by the Soviet Union to provide communications coverage to high latitudes that geostationary satellites could not reach.\n\n<b><color=#00ff00>Reference Target Period (1/2 Day):</color></b>\n• Stock/Kopernicus: ~3 hours\n• JNSQ: ~6 hours\n• RSS/KSRSS: ~11h 58m
    genericDescription = Launch a satellite into the requested high-eccentricity orbit.
    completedMessage = The satellite is in position! We now have extended coverage over the high latitudes.
    
    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1
    
    cancellable = true
    declinable = true
    
    targetBody = HomeWorld()
    
    // REWARDS
    rewardScience = 5
    rewardReputation = 20
    rewardFunds = @CareerEvolution:Kerbucks3
    
    advanceFunds = @CareerEvolution:Kerbucks2
    
    prestige = Exceptional

    
    // DATA NODE: Dynamically calculates the correct period in seconds for any planet pack
    DATA
    {
        type = double
        dayLength = HomeWorld().RotationalPeriod()
        minPeriodSeconds = @dayLength * 0.45
        maxPeriodSeconds = @dayLength * 0.55
        
        // --- Dynamic Ap/Pe Calculation for Briefing ---
        targetEccentricity = 0.6 
 
        targetPeriod = @dayLength * 0.5
        
        // KSP Gravitational Constant * Body Mass (Avoids scientific notation parser error)
        mu = 0.0000000000667408 * HomeWorld().Mass()
        
        // Semi-major axis via Keplers Third Law (Using hardcoded Tau to bypass parser method lookup)
        sma = Pow((@mu * Pow(@targetPeriod / 6.28318530718, 2)), 0.333333333333)
        
       
        // Ap/Pe in meters, then converted to kilometers for the UI
        targetApKM = ((@sma * (1 + @targetEccentricity)) - HomeWorld().Radius()) / 1000
        targetPeKM = ((@sma * (1 - @targetEccentricity)) - HomeWorld().Radius()) / 1000
    }

    REQUIREMENT
    {
        name = CompleteContract
        type = CompleteContract
        contractType = MEOSat
        title = Complete @contractType Contract
    }
    
    PARAMETER
    {
        name = MolniyaSat
        type = VesselParameterGroup
        title = Molniya Satellite
        define = MolniyaSat
        
        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a New Vessel
            hideChildren = true
        }
        PARAMETER 
        {
            name = Crewmembers
            type = HasCrew
            minCrew = 0
            maxCrew = 0
            title = Uncrewed
            hideChildren = true
        }
        PARAMETER
        {
            name = HemisphereChoice
            type = Any
            title = Achieve Target Molniya Parameters (North or South Dwell)
            
            PARAMETER
            {
                name = MolniyaOrbitNorth
                type = Orbit
                
                minInclination = 63.0
                maxInclination = 64.0
                minEccentricity = 0.6
                
                // Calls the pre-calculated double variables from the DATA node
                minPeriod = @/minPeriodSeconds
                maxPeriod = @/maxPeriodSeconds
                
                minArgumentOfPeriapsis = 260
                maxArgumentOfPeriapsis = 280
                 
                disableOnStateChange = true
                title = Northern Hemisphere Dwell (AoP: 260-280)
            }
            PARAMETER
            {
                name = MolniyaOrbitSouth
                type = Orbit
                
                minInclination = 63.0
                maxInclination = 64.0
                minEccentricity = 0.6 
                 
                // Calls the pre-calculated double variables from the DATA node
                minPeriod = @/minPeriodSeconds
                maxPeriod = @/maxPeriodSeconds
                
                minArgumentOfPeriapsis = 80
                maxArgumentOfPeriapsis = 100
                
                disableOnStateChange = true
                title = Southern Hemisphere Dwell (AoP: 80-100)
            }
        }
    }
}


