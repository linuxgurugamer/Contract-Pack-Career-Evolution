// *************************** Tundra Satellite

CONTRACT_TYPE
{
    name = TundraSat
    
    group = Satellites
    
    title = Tundra Orbit Satellite
    agent = Experimental Engineering Group
    
    sortKey = 108
    
    notes = Launch a satellite into a Tundra orbit (Geosynchronous, High Eccentricity, 63.4 degrees inclination)
    synopsis = Launch a satellite into a Tundra orbit
    
    description = Similar to the Molniya orbit, a Tundra orbit is designed to dwell over high latitudes. However, instead of a 12-hour period, it uses a 24-hour Geosynchronous period. This creates a "figure-8" ground track that keeps the satellite over a specific region for a long duration.\n\n<b><color=white>Dynamic Target Altitudes:</color></b> Aim for an approximate Apoapsis of <b>@/targetApKM km</b> and a Periapsis of <b>@/targetPeKM km</b>.\n\n<b><color=#00ff00>Reference Target Period (1 Day):</color></b>\n• Stock/Kopernicus: ~6 hours\n• JNSQ: ~12 hours\n• RSS/KSRSS: ~23h 56m
